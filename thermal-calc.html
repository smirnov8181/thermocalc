<!DOCTYPE html>
<html lang="ru" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThermoCalc — Теплотехнический калькулятор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM TOKENS (from MASTER.md — oklch monochrome) ===== */
:root {
  --background: oklch(0.985 0 0);
  --foreground: oklch(0.145 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.145 0 0);
  --primary: oklch(0.205 0 0);
  --primary-foreground: oklch(0.985 0 0);
  --secondary: oklch(0.97 0 0);
  --secondary-foreground: oklch(0.205 0 0);
  --muted: oklch(0.97 0 0);
  --muted-foreground: oklch(0.556 0 0);
  --border: oklch(0.922 0 0);
  --input: oklch(0.922 0 0);
  --ring: oklch(0.708 0 0);
  --destructive: oklch(0.577 0.245 27.325);
  --destructive-foreground: oklch(0.985 0 0);

  /* Extended palette */
  --brand: oklch(0.6 0.18 230);
  --brand-light: oklch(0.92 0.04 230);
  --brand-foreground: oklch(0.985 0 0);
  --success: oklch(0.65 0.18 145);
  --success-light: oklch(0.92 0.05 145);
  --success-foreground: oklch(0.985 0 0);
  --warning: oklch(0.75 0.15 75);
  --warning-light: oklch(0.94 0.04 75);
  --warning-foreground: oklch(0.3 0 0);
  --info: oklch(0.65 0.15 250);
  --info-light: oklch(0.94 0.03 250);

  /* Radii from MASTER.md */
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.625rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.25rem;
  --radius-3xl: 1.5rem;

  /* Shadows */
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-md: 0 2px 8px oklch(0 0 0 / 0.06), 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-lg: 0 4px 16px oklch(0 0 0 / 0.08), 0 2px 4px oklch(0 0 0 / 0.04);
  --shadow-xl: 0 8px 32px oklch(0 0 0 / 0.1), 0 4px 8px oklch(0 0 0 / 0.04);

  font-size: 15px;
}

.dark {
  --background: oklch(0.13 0 0);
  --foreground: oklch(0.93 0 0);
  --card: oklch(0.17 0 0);
  --card-foreground: oklch(0.93 0 0);
  --primary: oklch(0.93 0 0);
  --primary-foreground: oklch(0.13 0 0);
  --secondary: oklch(0.22 0 0);
  --secondary-foreground: oklch(0.85 0 0);
  --muted: oklch(0.22 0 0);
  --muted-foreground: oklch(0.6 0 0);
  --border: oklch(1 0 0 / 10%);
  --input: oklch(1 0 0 / 10%);
  --ring: oklch(0.5 0 0);
  --destructive: oklch(0.704 0.191 22.216);
  --brand: oklch(0.7 0.16 230);
  --brand-light: oklch(0.25 0.05 230);
  --success: oklch(0.72 0.16 145);
  --success-light: oklch(0.25 0.05 145);
  --warning: oklch(0.8 0.13 75);
  --warning-light: oklch(0.28 0.04 75);
  --info: oklch(0.72 0.13 250);
  --info-light: oklch(0.25 0.03 250);
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 2px 8px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 4px 16px oklch(0 0 0 / 0.35);
  --shadow-xl: 0 8px 32px oklch(0 0 0 / 0.4);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--background);
  color: var(--foreground);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* ===== APP LAYOUT ===== */
.app {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  position: sticky;
  top: 0;
  background: var(--background);
  z-index: 30;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  text-decoration: none;
  color: var(--foreground);
}

.logo-icon {
  width: 2rem;
  height: 2rem;
  background: var(--primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary-foreground);
}

.logo-text {
  font-size: 1.125rem;
  font-weight: 700;
  letter-spacing: -0.025em;
}

.logo-badge {
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--muted-foreground);
  background: var(--secondary);
  padding: 0.125rem 0.5rem;
  border-radius: 9999px;
  border: 1px solid var(--border);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 500;
  line-height: 1;
  padding: 0.5625rem 1rem;
  border-radius: var(--radius-xl);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 150ms ease;
  white-space: nowrap;
  text-decoration: none;
  outline: none;
}
.btn:focus-visible {
  box-shadow: 0 0 0 3px var(--ring);
}
.btn-primary {
  background: var(--primary);
  color: var(--primary-foreground);
}
.btn-primary:hover { opacity: 0.88; }
.btn-secondary {
  background: var(--secondary);
  color: var(--secondary-foreground);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--muted); }
.btn-outline {
  background: transparent;
  color: var(--foreground);
  border-color: var(--border);
}
.btn-outline:hover { background: var(--secondary); }
.btn-ghost {
  background: transparent;
  color: var(--foreground);
}
.btn-ghost:hover { background: var(--secondary); }
.btn-destructive {
  background: var(--destructive);
  color: var(--destructive-foreground);
}
.btn-destructive:hover { opacity: 0.88; }
.btn-brand {
  background: var(--brand);
  color: var(--brand-foreground);
}
.btn-brand:hover { opacity: 0.88; }

.btn-sm { font-size: 0.8125rem; padding: 0.375rem 0.75rem; }
.btn-lg { font-size: 0.9375rem; padding: 0.6875rem 1.25rem; }
.btn-icon {
  width: 2.25rem;
  height: 2.25rem;
  padding: 0;
  border-radius: var(--radius-lg);
}
.btn-icon-sm {
  width: 1.875rem;
  height: 1.875rem;
  padding: 0;
  border-radius: var(--radius-md);
}

.btn svg { width: 1rem; height: 1rem; flex-shrink: 0; }
.btn-icon svg, .btn-icon-sm svg { width: 1rem; height: 1rem; }

/* ===== CARD ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.card-header {
  padding: 1.25rem 1.5rem 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
}

.card-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
  line-height: 1.4;
}

.card-description {
  font-size: 0.8125rem;
  color: var(--muted-foreground);
  margin-top: 0.125rem;
  line-height: 1.5;
}

.card-content { padding: 1.25rem 1.5rem; }
.card-footer {
  padding: 0 1.5rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

/* ===== BADGE ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.6875rem;
  font-weight: 600;
  padding: 0.1875rem 0.5rem;
  border-radius: 9999px;
  letter-spacing: 0.01em;
  line-height: 1.4;
}
.badge-default { background: var(--primary); color: var(--primary-foreground); }
.badge-secondary { background: var(--secondary); color: var(--secondary-foreground); border: 1px solid var(--border); }
.badge-success { background: var(--success-light); color: var(--success); }
.badge-warning { background: var(--warning-light); color: var(--warning-foreground); }
.badge-destructive { background: oklch(0.577 0.245 27.325 / 0.1); color: var(--destructive); }
.badge-brand { background: var(--brand-light); color: var(--brand); }
.badge-info { background: var(--info-light); color: var(--info); }

/* ===== INPUT / SELECT ===== */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}

.input-label {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--foreground);
}

.input-hint {
  font-size: 0.75rem;
  color: var(--muted-foreground);
}

.input, .select {
  font-family: inherit;
  font-size: 0.875rem;
  height: 2.25rem;
  padding: 0 0.75rem;
  border: 1px solid var(--input);
  border-radius: var(--radius-md);
  background: var(--card);
  color: var(--foreground);
  outline: none;
  transition: all 150ms ease;
  width: 100%;
}
.input:focus, .select:focus {
  border-color: var(--ring);
  box-shadow: 0 0 0 3px oklch(0.708 0 0 / 0.15);
}
.input::placeholder { color: var(--muted-foreground); }
.input-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8125rem;
}

/* Number input with unit */
.input-unit-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.input-unit-wrap .input { padding-right: 2.5rem; }
.input-unit {
  position: absolute;
  right: 0.75rem;
  font-size: 0.75rem;
  color: var(--muted-foreground);
  pointer-events: none;
  font-family: 'JetBrains Mono', monospace;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 0.125rem;
  background: var(--secondary);
  border-radius: var(--radius-lg);
  padding: 0.25rem;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.375rem;
  padding: 0.5rem 0.75rem;
  font-family: inherit;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--muted-foreground);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 150ms ease;
  white-space: nowrap;
}
.tab:hover { color: var(--foreground); }
.tab.active {
  background: var(--card);
  color: var(--foreground);
  box-shadow: var(--shadow-sm);
}
.tab svg { width: 0.875rem; height: 0.875rem; }

/* ===== MAIN GRID LAYOUT ===== */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 2rem;
}

@media (max-width: 860px) {
  .main-grid { grid-template-columns: 1fr; }
}

/* ===== CONSTRUCTION LAYERS ===== */
.layers-list {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}

.layer-item {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: 0.75rem;
  padding: 0.625rem 0.875rem;
  background: var(--secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all 150ms ease;
  cursor: grab;
  position: relative;
}
.layer-item:hover {
  border-color: var(--ring);
  box-shadow: var(--shadow-sm);
}
.layer-item.dragging {
  opacity: 0.5;
  box-shadow: var(--shadow-lg);
}

.layer-grip {
  color: var(--muted-foreground);
  cursor: grab;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.layer-grip span {
  display: block;
  width: 12px;
  height: 2px;
  background: var(--muted-foreground);
  border-radius: 1px;
  opacity: 0.5;
}

.layer-color {
  width: 0.75rem;
  height: 2.5rem;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.layer-info { min-width: 0; }
.layer-name {
  font-size: 0.8125rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.layer-material {
  font-size: 0.6875rem;
  color: var(--muted-foreground);
}

.layer-thickness {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8125rem;
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
}

.layer-r {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6875rem;
  color: var(--muted-foreground);
  text-align: right;
  white-space: nowrap;
  min-width: 4rem;
}

.layer-actions {
  display: flex;
  gap: 0.25rem;
}

/* ===== WALL CROSS-SECTION VISUALIZATION ===== */
.wall-viz {
  display: flex;
  align-items: stretch;
  height: 240px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
}

.wall-side-label {
  position: absolute;
  top: 0.5rem;
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--muted-foreground);
  z-index: 2;
  background: oklch(1 0 0 / 0.7);
  padding: 0.125rem 0.375rem;
  border-radius: var(--radius-sm);
}
.dark .wall-side-label { background: oklch(0.17 0 0 / 0.7); }
.wall-side-label.inside { left: 0.5rem; }
.wall-side-label.outside { right: 0.5rem; }

.wall-layer-viz {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-width: 30px;
  position: relative;
  transition: all 300ms ease;
  cursor: pointer;
  border-right: 1px solid oklch(0 0 0 / 0.08);
}
.wall-layer-viz:last-child { border-right: none; }
.wall-layer-viz:hover { opacity: 0.85; }

.wall-layer-viz-label {
  font-size: 0.5625rem;
  font-weight: 600;
  color: oklch(0.3 0 0);
  text-align: center;
  padding: 0.25rem;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  max-height: 100%;
  overflow: hidden;
}

.wall-layer-viz-thickness {
  position: absolute;
  bottom: 0.375rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5625rem;
  font-weight: 600;
  color: oklch(0.3 0 0 / 0.7);
  writing-mode: horizontal-tb;
}

/* ===== TEMPERATURE GRAPH ===== */
.temp-graph-container {
  position: relative;
  height: 280px;
  width: 100%;
}

.temp-graph-canvas {
  width: 100%;
  height: 100%;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--card);
}

/* ===== RESULTS PANEL ===== */
.results-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
}

@media (max-width: 600px) {
  .results-grid { grid-template-columns: 1fr 1fr; }
}

.result-card {
  padding: 1rem;
  border-radius: var(--radius-lg);
  background: var(--secondary);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.result-label {
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--muted-foreground);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.result-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
}

.result-unit {
  font-size: 0.75rem;
  color: var(--muted-foreground);
  font-weight: 400;
}

.result-status {
  font-size: 0.6875rem;
  font-weight: 500;
  margin-top: 0.25rem;
}

/* ===== MATERIAL DIALOG ===== */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0 0 0 / 0.4);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  visibility: hidden;
  transition: all 200ms ease;
}
.dialog-overlay.open {
  opacity: 1;
  visibility: visible;
}

.dialog {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-xl);
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: scale(0.96) translateY(8px);
  transition: transform 200ms ease;
}
.dialog-overlay.open .dialog {
  transform: scale(1) translateY(0);
}

.dialog-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.dialog-title {
  font-size: 1.0625rem;
  font-weight: 600;
  letter-spacing: -0.015em;
}

.dialog-body {
  padding: 1rem 1.5rem;
  overflow-y: auto;
  flex: 1;
}

.dialog-footer {
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
}

/* Material list */
.material-category {
  margin-bottom: 0.75rem;
}
.material-category-title {
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-foreground);
  padding: 0.375rem 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.375rem;
}

.material-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.625rem;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 100ms ease;
  border: 1px solid transparent;
}
.material-option:hover { background: var(--secondary); }
.material-option.selected {
  background: var(--brand-light);
  border-color: var(--brand);
}

.material-option-name {
  font-size: 0.8125rem;
  font-weight: 500;
}
.material-option-lambda {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted-foreground);
}

/* ===== CLIMATE SELECTOR ===== */
.climate-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.climate-block {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}

.climate-block-title {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted-foreground);
  display: flex;
  align-items: center;
  gap: 0.375rem;
}

.temp-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  display: flex;
  align-items: baseline;
  gap: 0.125rem;
}
.temp-display .unit {
  font-size: 0.875rem;
  font-weight: 400;
  color: var(--muted-foreground);
}

/* ===== SLIDER ===== */
.slider-wrap { position: relative; }
.slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  border: 3px solid var(--card);
  box-shadow: var(--shadow-md);
  transition: transform 100ms ease;
}
.slider::-webkit-slider-thumb:hover {
  transform: scale(1.15);
}

/* ===== THEME TOGGLE ===== */
.theme-toggle {
  position: relative;
  width: 2.75rem;
  height: 1.5rem;
  border-radius: 9999px;
  background: var(--secondary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 200ms ease;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 1.125rem;
  height: 1.125rem;
  border-radius: 50%;
  background: var(--primary);
  transition: transform 200ms ease;
}
.dark .theme-toggle::after {
  transform: translateX(1.25rem);
}

/* ===== SECTION SPACING ===== */
.section { margin-bottom: 1.5rem; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.section-title {
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* ===== NORMA BAR ===== */
.norma-bar-wrap {
  position: relative;
  height: 2.25rem;
  margin: 1rem 0;
}

.norma-bar-bg {
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  transform: translateY(-50%);
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.norma-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 500ms cubic-bezier(0.25, 0.4, 0.25, 1);
}

.norma-marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--foreground);
  border-radius: 1px;
}

.norma-marker-label {
  position: absolute;
  bottom: -0.25rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5625rem;
  font-weight: 600;
  color: var(--muted-foreground);
  white-space: nowrap;
}

  display: flex;
  flex-direction: column;

  justify-content: center;

  text-align: center;

  font-size: 0.875rem;
  font-weight: 500;
  margin-bottom: 0.25rem;
}
.empty-state-hint {
  font-size: 0.75rem;
  opacity: 0.7;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.animate-in {
  animation: fadeInUp 400ms cubic-bezier(0.25, 0.4, 0.25, 1) both;
}

.stagger-1 { animation-delay: 50ms; }
.stagger-2 { animation-delay: 100ms; }
.stagger-3 { animation-delay: 150ms; }
.stagger-4 { animation-delay: 200ms; }

/* ===== FOOTER ===== */
.footer {

  align-items: center;
  justify-content: space-between;

// ===== CALCULATIONS =====
function calcR(layers) {
  const Rint = 1 / 8.7;
  const Rext = 1 / 23;
  let Rwall = 0;
  layers.forEach(l => {
    Rwall += (l.thickness / 1000) / l.material.lambda;
  });
  return { Rint, Rext, Rwall, Rtotal: Rint + Rwall + Rext };
}

function calcTemperatures(layers, tIn, tOut) {
  const { Rint, Rext, Rwall, Rtotal } = calcR(layers);
  if (Rtotal === 0) return [];
  const q = (tIn - tOut) / Rtotal;
  const points = [];
  let cumR = 0;
  let cumThick = 0;

  points.push({ x: 0, t: tIn, label: "Внутри" });
  cumR += Rint;
  points.push({ x: 0, t: tIn - q * cumR, label: "Пов-сть (в)" });

  layers.forEach((l, i) => {
    const Rl = (l.thickness / 1000) / l.material.lambda;
    cumR += Rl;
    cumThick += l.thickness;
    points.push({
      x: cumThick,
      t: tIn - q * cumR,
      label: l.material.name
    });
  });

  cumR += Rext;
  points.push({ x: cumThick, t: tOut, label: "Пов-сть (н)" });
  points.push({ x: cumThick + 5, t: tOut, label: "Снаружи" });

  return points;
}

function dewPoint(t, rh) {
  const a = 17.27, b = 237.7;
  const alpha = (a * t) / (b + t) + Math.log(rh / 100);
  return (b * alpha) / (a - alpha);
}

function getRequired(gsop) {
  // Approximated from SNiP table for walls
  return 0.00035 * gsop + 1.4;
}

function getSanitary(tIn, tOut, n, deltaT, alphaInt) {
  return n * (tIn - tOut) / (deltaT * alphaInt);
}

  const meetsSanitary = Rtotal >= Rsanitary;
  const condensationRisk = innerSurfaceTemp <= dewP;

  // Heat loss
  const qPerHour = Rtotal > 0 ? (tempInside - tempOutside) / Rtotal : 0;
  const qSeason = Rtotal > 0 ? (tempInside - (-1.7)) / Rtotal * 202 * 24 / 1000 : 0;

  const app = document.getElementById('app');
  app.innerHTML = `

// ===== TEMPERATURE GRAPH DRAWING =====
function drawTempGraph(temps, dewP) {
  const canvas = document.getElementById('tempCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 24, right: 16, bottom: 28, left: 44 };

  if (temps.length < 2) {
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted-foreground').trim();
    ctx.font = '13px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('Добавьте слои для визуализации', W/2, H/2);
    return;
  }

  const isDark = state.isDark;
  const tMin = Math.min(...temps.map(p => p.t), dewP) - 3;
  const tMax = Math.max(...temps.map(p => p.t), dewP) + 3;
  const xMax = temps[temps.length-1].x || 1;

  const toX = (x) => pad.left + (x / xMax) * (W - pad.left - pad.right);
  const toY = (t) => pad.top + ((tMax - t) / (tMax - tMin)) * (H - pad.top - pad.bottom);

  // Grid
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  const tStep = Math.ceil((tMax - tMin) / 6);
  for (let t = Math.ceil(tMin); t <= tMax; t += tStep) {
    const y = toY(t);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    ctx.fillStyle = isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(`${t}°`, pad.left - 6, y + 3);
  }

  // Layer backgrounds
  let cumulX = 0;
  state.layers.forEach((l, i) => {
    const x1 = toX(cumulX);
    cumulX += l.thickness;
    const x2 = toX(cumulX);
    ctx.fillStyle = l.material.color + '30';
    ctx.fillRect(x1, pad.top, x2 - x1, H - pad.top - pad.bottom);
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.moveTo(x2, pad.top);
    ctx.lineTo(x2, H - pad.bottom);
    ctx.stroke();
  });

  // Dew point line
  const dewY = toY(dewP);
  ctx.strokeStyle = isDark ? 'rgba(100,180,255,0.35)' : 'rgba(0,100,200,0.3)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pad.left, dewY);
  ctx.lineTo(W - pad.right, dewY);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = isDark ? 'rgba(100,180,255,0.6)' : 'rgba(0,100,200,0.5)';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.fillText(`Точка росы ${dewP.toFixed(1)}°`, pad.left + 4, dewY - 5);

  // Temperature line
  ctx.strokeStyle = isDark ? '#ff7070' : '#d44';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();
  temps.forEach((p, i) => {
    const x = toX(p.x);
    const y = toY(p.t);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Points
  temps.forEach((p, i) => {
    if (i === 0 || i === temps.length - 1) return;
    const x = toX(p.x);
    const y = toY(p.t);
    ctx.fillStyle = isDark ? '#ff7070' : '#d44';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isDark ? '#333' : '#fff';
    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ===== STATE MANAGEMENT =====
function updateState(key, value) {
  state[key] = value;
  render();
}

function updateThickness(id, value) {
  const layer = state.layers.find(l => l.id === id);
  if (layer) layer.thickness = Math.max(1, Math.min(1000, value));
  render();
}

function removeLayer(id) {
  state.layers = state.layers.filter(l => l.id !== id);
  render();
}

function moveLayer(index, dir) {
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= state.layers.length) return;
  const temp = state.layers[index];
  state.layers[index] = state.layers[newIndex];
  state.layers[newIndex] = temp;
  render();
}

function addLayer(category, materialIndex) {
  const mat = MATERIALS[category][materialIndex];
  let defaultThickness = 100;
  if (category === "Каменная кладка") defaultThickness = 375;
  if (category === "Отделка") defaultThickness = 20;
  if (category === "Прочее" && mat.name.includes("изоляция")) defaultThickness = 1;

  state.layers.push({
    id: state.nextId++,
    material: mat,
    thickness: defaultThickness
  });
  state.dialogOpen = false;
  render();
}

function openDialog() { state.dialogOpen = true; render(); }
function closeDialog(e) {
  if (e.target.classList.contains('dialog-overlay')) {
    state.dialogOpen = false;
    render();
  }
}

function toggleTheme() {
  state.isDark = !state.isDark;
  document.documentElement.className = state.isDark ? 'dark' : 'light';
  render();
}

function shareCalc() {
  const params = state.layers.map(l => `${encodeURIComponent(l.material.name)}:${l.thickness}`).join('|');
  const url = `${location.origin}${location.pathname}?layers=${params}&ti=${state.tempInside}&to=${state.tempOutside}`;
  navigator.clipboard?.writeText(url).then(() => {
    alert('Ссылка на расчёт скопирована!');
  });
}

// ===== DRAG & DROP =====
let dragIndex = null;
function dragStart(e, i) { dragIndex = i; e.currentTarget.classList.add('dragging'); }
function dragOver(e, i) { e.preventDefault(); }
function drop(e, i) {
  e.preventDefault();
  if (dragIndex === null || dragIndex === i) return;
  const item = state.layers.splice(dragIndex, 1)[0];
  state.layers.splice(i, 0, item);
  dragIndex = null;
  render();
}
function dragEnd() { dragIndex = null; document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging')); }

// ===== INIT =====
render();

// Responsive canvas redraw
window.addEventListener('resize', () => {
  if (state.activeTab === 'thermal') {
    const temps = calcTemperatures(state.layers, state.tempInside, state.tempOutside);
    const dewP = dewPoint(state.tempInside, state.humidityInside);
    drawTempGraph(temps, dewP);
  }
});
</script>
